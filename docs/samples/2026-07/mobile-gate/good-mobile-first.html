<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Good mobile-first fixture</title>
  <style>
    :root { --bg: #0f1419; --fg: #e7ecf1; --accent: #3d9a7a; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "IBM Plex Sans", system-ui, sans-serif; background: var(--bg); color: var(--fg); }
    .top { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #243040; }
    .hamburger { min-width: 44px; min-height: 44px; border: 0; border-radius: 8px; background: #1a2430; color: var(--fg); }
    .sidebar { display: none; padding: 16px; background: #141c26; }
    .sidebar.open { display: block; }
    main { padding: 16px; display: grid; gap: 12px; }
    .card { padding: 16px; border-radius: 12px; background: #1a2430; }
    @media (min-width: 768px) {
      .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
      .hamburger { display: none; }
      .sidebar { display: block; }
      main { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="top">
      <button type="button" class="hamburger" aria-expanded="false" aria-label="Open menu">☰</button>
      <strong>Ops</strong>
    </header>
    <aside class="sidebar" id="nav">Dashboard · Reports · Settings</aside>
    <main>
      <div class="card">Revenue</div>
      <div class="card">Users</div>
      <div class="card">Latency</div>
    </main>
  </div>
  <script>
    document.querySelector(".hamburger")?.addEventListener("click", function () {
      document.getElementById("nav")?.classList.toggle("open");
    });
  </script>
</body>
</html>
