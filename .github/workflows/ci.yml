# CI for cosy-app-kit — Bun + Node 24
# Green gate for developeredit / PR into main. Main stays locked (PR only, no force-push).
# Typecheck is a HARD gate (no continue-on-error).
name: CI

on:
  push:
    branches: [developeredit]
  pull_request:
    branches: [main, developeredit]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Install · test · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Vitest only (package.json "test" / "test:unit") — not bare `bun test` (breaks vi mocks)
      - name: Unit tests
        run: bun run test:unit

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          MISTRAL_API_KEY: ci-placeholder-not-used-at-build
