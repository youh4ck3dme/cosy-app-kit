# CI for cosy-app-kit — Node 24 (avoids Node 20 deprecation warnings on GHA runners)
# Green gate for developeredit; main stays locked (PR only, no auto-merge).
name: CI

on:
  push:
    branches: [developeredit]
  pull_request:
    branches: [main, developeredit]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Install · test · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 for any tooling that shells out to node (not Node 20 — deprecation)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun run test

      # Hard gate (no continue-on-error): tsc is green on developeredit; soft-fail hid real breaks.
      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build
        env:
          # Build-time placeholders only — this job does not call live Supabase/Mistral.
          # Do not commit real keys. Wire repo Actions secrets here only if a future
          # step needs live credentials (and the secrets exist in Settings → Secrets).
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          MISTRAL_API_KEY: ci-placeholder-not-used-at-build
